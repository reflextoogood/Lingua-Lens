<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a35"/>
      <stop offset="100%" stop-color="#1a1a1f"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c5cfc"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- magnifying glass ring -->
  <circle cx="54" cy="54" r="26" fill="none" stroke="url(#ring)" stroke-width="8"/>

  <!-- handle -->
  <line x1="73" y1="73" x2="96" y2="96" stroke="url(#ring)" stroke-width="9" stroke-linecap="round"/>

  <!-- subtitle line inside the lens, representing the word being explained -->
  <rect x="40" y="50" width="28" height="4.5" rx="2.25" fill="#ffffff" opacity="0.95"/>
  <rect x="40" y="59" width="18" height="4.5" rx="2.25" fill="#ffffff" opacity="0.6"/>

  <!-- small spark/accent dot, suggesting "explained" / insight -->
  <circle cx="96" cy="32" r="5" fill="#a78bfa"/>
</svg>
